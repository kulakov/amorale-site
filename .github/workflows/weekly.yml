name: weekly-update

on:
  schedule:
    - cron: '17 6 * * 1'        # каждый понедельник 06:17 UTC (~08:17 Варшава)
  workflow_dispatch:
    inputs:
      skip_scan:
        description: 'Skip the scrape, just rebuild+deploy from committed data'
        type: boolean
        default: false

permissions:
  contents: write                 # чтобы коммитить feed.xml + prev_top.json обратно

concurrency:
  group: weekly-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scan Author.Today (rebuild ranking)
        if: ${{ inputs.skip_scan != true }}
        env:
          AT_LOGIN: ${{ secrets.AT_LOGIN }}
          AT_PASSWORD: ${{ secrets.AT_PASSWORD }}
        run: |
          python scan.py
          test -s at_moral_final.json || (echo "scan produced no data" && exit 1)

      - name: Build site
        run: python build.py

      - name: Update RSS digest feed
        run: python feed.py

      - name: Commit snapshot + feed
        run: |
          git config user.name "amorale-bot"
          git config user.email "bot@users.noreply.github.com"
          git add feed.xml prev_top.json at_moral_final.json index.html
          git commit -m "weekly update $(date -u +%F)" || echo "nothing to commit"
          git push || echo "push skipped"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx --yes vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"

# trigger registration
